<!DOCTYPE html>
<html lang="en">
<head>
    <title>Project Manager — Harbour Tech</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <style>
        body { background: #06080f; color: #fff; font-family: 'DM Sans', sans-serif; padding: 40px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .btn { background: #6366f1; color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; font-weight: 700; }
        .project-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 24px; border-radius: 16px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
        .status { padding: 4px 12px; border-radius: 20px; font-size: 12px; background: rgba(16, 185, 129, 0.2); color: #34d399; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 12px; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Project Manager</h1>
            <div>
                <button class="btn" onclick="openModal()">+ New Project</button>
                <a href="/admin_dashboard.html" style="color: #94a3b8; margin-left: 20px; text-decoration: none;">← Back</a>
            </div>
        </div>

        <div id="projectList">Loading projects...</div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div style="background: #1a1c2e; padding: 40px; border-radius: 20px; width: 400px;">
            <h2 style="margin-top: 0;">New Project</h2>
            <input type="text" id="pTitle" placeholder="Project Title">
            <input type="text" id="pClient" placeholder="Client Name">
            <textarea id="pDesc" placeholder="Description"></textarea>
            <button class="btn" style="width: 100%;" onclick="saveProject()">Create Project</button>
            <button class="btn" style="width: 100%; background: #333; margin-top: 10px;" onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <script>
        async function fetchProjects() {
            const res = await fetch('/api/projects.php');
            const data = await res.json();
            const list = document.getElementById('projectList');
            if (data.length === 0) {
                list.innerHTML = '<p style="color: #64748b;">No projects yet.</p>';
                return;
            }
            list.innerHTML = data.map(p => `
                <div class="project-card">
                    <div>
                        <h3 style="margin: 0 0 4px 0;">${p.title}</h3>
                        <p style="margin: 0; color: #94a3b8; font-size: 14px;">Client: ${p.client_name}</p>
                    </div>
                    <div style="display: flex; align-items: center; gap: 20px;">
                        <span class="status">${p.status}</span>
                        <button onclick="deleteProject(${p.id})" style="background: none; border: none; color: #f87171; cursor: pointer;">🗑</button>
                    </div>
                </div>
            `).join('');
        }

        async function saveProject() {
            const fd = new FormData();
            fd.append('title', document.getElementById('pTitle').value);
            fd.append('client_name', document.getElementById('pClient').value);
            fd.append('description', document.getElementById('pDesc').value);
            
            await fetch('/api/projects.php', { method: 'POST', body: fd });
            closeModal();
            fetchProjects();
        }

        async function deleteProject(id) {
            if (!confirm('Delete this project?')) return;
            const fd = new FormData();
            fd.append('id', id);
            await fetch('/api/projects.php/delete', { method: 'POST', body: fd });
            fetchProjects();
        }

        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        fetchProjects();
    </script>
</body>
</html>
