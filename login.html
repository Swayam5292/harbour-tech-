<!DOCTYPE html>
<html lang="en">
<head>
  <title>Login – Harbour Tech Solutions</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="login.css" rel="stylesheet">
</head>
<body>

<!-- NAVBAR -->
<nav class="main-nav">
  <a class="nav-brand" href="index.html">⚓ Harbour Tech Solutions</a>
  <div class="nav-links">
    <span id="userDisplay" style="color:white; font-weight:bold;"></span>
    <button id="logoutBtn" onclick="logout()" style="display:none; background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3); color:white; padding:6px 14px; border-radius:8px; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:13px;">Logout</button>
    <a href="index.html">Home</a>
    <a href="login.html">Login</a>
    <button id="theme-btn" onclick="toggleTheme()">🌙 Theme</button>
  </div>
</nav>

<!-- AUTH CARD -->
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-top-bar"></div>
    <div class="auth-body">

      <h2>Account Access</h2>

      <!-- TABS -->
      <div class="auth-tabs">
        <button class="tab-btn active" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" onclick="switchTab('register')">Register</button>
      </div>

      <!-- LOGIN PANEL -->
      <div class="tab-panel active" id="loginPanel">
        <form id="loginForm">

          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="loginEmail" placeholder="Enter your email" required>
          </div>

          <div class="form-group">
            <label>Password</label>
            <div class="input-wrap">
              <input type="password" id="loginPassword" placeholder="Enter your password" required>
              <button type="button" class="toggle-pw" onclick="togglePw('loginPassword', this)">👁️</button>
            </div>
          </div>

          <div class="remember-row">
            <input type="checkbox" id="rememberMe">
            <label for="rememberMe">Remember me</label>
          </div>

          <button type="submit" class="btn-primary-pro">Login →</button>
        </form>
      </div>

      <!-- REGISTER PANEL -->
      <div class="tab-panel" id="registerPanel">
        <form id="registerForm">

          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="regName" placeholder="Enter your full name" required>
          </div>

          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="regEmail" placeholder="Enter your email" required>
          </div>

          <div class="form-group">
            <label>Password</label>
            <div class="input-wrap">
              <input type="password" id="regPassword" placeholder="Create a password" required>
              <button type="button" class="toggle-pw" onclick="togglePw('regPassword', this)">👁️</button>
            </div>
            <div class="pw-strength" id="pwStrength"></div>
          </div>

          <div class="form-group">
            <label>Confirm Password</label>
            <div class="input-wrap">
              <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
              <button type="button" class="toggle-pw" onclick="togglePw('confirmPassword', this)">👁️</button>
            </div>
          </div>

          <button type="submit" class="btn-success-pro">Create Account →</button>
        </form>
      </div>

    </div>
  </div>
</div>

<!-- FOOTER -->
<footer>© 2026 Harbour Tech Solutions · All Rights Reserved</footer>

<script src="login.js"></script>
</body>
</html>
